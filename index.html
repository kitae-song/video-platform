<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>강의 플랫폼 프리뷰</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.app{width:100%;max-width:900px;background:#f5f5f3;min-height:600px;border-radius:12px;overflow:hidden;border:1px solid rgba(0,0,0,0.08);box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.screen{display:none}
.screen.active{display:flex;flex-direction:column;min-height:600px}
.hdr{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:500;color:#1a1a1a}
.hdr-nav{display:flex;gap:4px}
.tab-btn{font-size:12px;padding:5px 12px;border-radius:8px;border:none;cursor:pointer;background:transparent;color:#666;transition:background .15s}
.tab-btn.on{background:#f0f0ee;color:#1a1a1a;font-weight:500}
.tab-btn:hover:not(.on){background:#f0f0ee}
.btn-sm{font-size:12px;padding:5px 14px;border-radius:8px;border:1px solid rgba(0,0,0,0.15);cursor:pointer;background:transparent;color:#666;transition:all .15s}
.btn-sm:hover{background:#f0f0ee}
.btn-primary{background:#3b82f6;color:#fff;border:none;font-size:13px;padding:9px 18px;border-radius:8px;cursor:pointer;font-weight:500;transition:background .15s;width:100%}
.btn-primary:hover{background:#2563eb}
.btn-purple{background:#7c3aed;color:#fff;border:none;font-size:13px;padding:9px 18px;border-radius:8px;cursor:pointer;font-weight:500;transition:background .15s;width:100%}
.btn-purple:hover{background:#6d28d9}
.inp{width:100%;border:1px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;color:#1a1a1a;background:#fff;outline:none;transition:border-color .15s}
.inp:focus{border-color:#3b82f6}
#s-landing{align-items:center;justify-content:center;gap:32px}
.landing-title{font-size:26px;font-weight:500;color:#1a1a1a;text-align:center}
.landing-sub{font-size:14px;color:#888;text-align:center;margin-top:6px}
.role-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.role-card{width:160px;padding:24px 16px;background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;cursor:pointer;text-align:center;transition:border-color .15s,box-shadow .15s}
.role-card:hover{border-color:#3b82f6;box-shadow:0 2px 12px rgba(59,130,246,0.12)}
.role-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.role-card-title{font-size:13px;font-weight:500;color:#1a1a1a}
.role-card-sub{font-size:11px;color:#888;margin-top:3px}
#s-login-student,#s-login-admin{align-items:center;justify-content:center}
.login-box{width:320px;background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;padding:28px 24px;display:flex;flex-direction:column;gap:16px;box-shadow:0 2px 16px rgba(0,0,0,0.06)}
.login-title{font-size:18px;font-weight:500;color:#1a1a1a}
.login-sub{font-size:12px;color:#888;margin-top:2px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:#666}
.back-link{font-size:12px;color:#aaa;text-align:center;cursor:pointer;transition:color .15s}
.back-link:hover{color:#666}
#s-student{flex-direction:column}
.s-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:240px;flex-shrink:0;background:#fff;border-right:0.5px solid rgba(0,0,0,0.08);padding:12px;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.vcard{padding:10px 12px;border-radius:8px;border:1px solid rgba(0,0,0,0.08);cursor:pointer;background:#fff;transition:border-color .15s}
.vcard:hover{border-color:rgba(0,0,0,0.18)}
.vcard.sel{border-color:#3b82f6;background:#eff6ff}
.vcard-title{font-size:12px;font-weight:500;color:#1a1a1a;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;gap:6px}
.badge-done{font-size:10px;background:#dcfce7;color:#166534;padding:2px 6px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.badge-quiz{font-size:10px;background:#fef3c7;color:#92400e;padding:2px 6px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.prog-bar-wrap{margin-top:5px}
.prog-label{display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-bottom:2px}
.prog-bar{height:3px;background:#f0f0ee;border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:#3b82f6;border-radius:999px;transition:width .3s}
.main-area{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.player-card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:16px}
.player-title{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:4px}
.player-desc{font-size:12px;color:#888;margin-bottom:12px}
.player-box{background:#111;border-radius:8px;aspect-ratio:16/9;position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center}
.play-btn{width:48px;height:48px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s}
.player-box:hover .play-btn{background:rgba(255,255,255,0.3)}
.play-arrow{width:0;height:0;border-top:11px solid transparent;border-bottom:11px solid transparent;border-left:18px solid white;margin-left:3px}
.progress-track{height:4px;background:#f0f0ee;border-radius:999px;overflow:hidden;margin:10px 0 8px;cursor:not-allowed;position:relative}
.progress-played{height:100%;background:#3b82f6;border-radius:999px;transition:width .1s}
.player-btns{display:flex;align-items:center;gap:10px}
.ctrl-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(0,0,0,0.12);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#666;transition:background .15s}
.ctrl-btn:hover{background:#f0f0ee}
.time-label{font-size:11px;color:#aaa;margin-left:auto}
.blocked-toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;font-size:11px;padding:6px 12px;border-radius:8px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s}
.blocked-toast.show{opacity:1}
.done-bar{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#166534}
.quiz-bar{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:14px}
.quiz-bar-title{font-size:12px;font-weight:500;color:#1e40af;margin-bottom:10px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#aaa}
.empty-icon{width:48px;height:48px;border-radius:50%;background:#f0f0ee;display:flex;align-items:center;justify-content:center;font-size:20px}
.quiz-wrap{display:flex;flex-direction:column;gap:14px}
.quiz-q{font-size:13px;font-weight:500;color:#1a1a1a}
.quiz-opts{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.quiz-opt{padding:8px 12px;border:1px solid rgba(0,0,0,0.12);border-radius:8px;cursor:pointer;font-size:12px;color:#1a1a1a;background:#fff;text-align:left;transition:all .15s}
.quiz-opt:hover{border-color:rgba(0,0,0,0.25)}
.quiz-opt.sel{border-color:#3b82f6;background:#eff6ff;color:#1e40af}
.quiz-result{text-align:center;padding:16px;background:#f5f5f3;border-radius:8px}
.quiz-score{font-size:32px;font-weight:500;color:#3b82f6}
#s-admin{flex-direction:column}
.admin-body{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:16px}
.card-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:12px}
.form-grid{display:grid;grid-template-columns:1fr 80px;gap:8px;margin-bottom:8px}
.up-bar-wrap{height:6px;background:#f0f0ee;border-radius:999px;overflow:hidden;margin-top:4px}
.up-bar{height:100%;background:#7c3aed;border-radius:999px;transition:width .3s}
.video-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.video-row:last-child{border-bottom:none}
.video-info{flex:1;min-width:0}
.video-name{font-size:13px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.video-meta{font-size:11px;color:#aaa;margin-top:2px}
.badge-active{font-size:10px;background:#dcfce7;color:#166534;padding:3px 8px;border-radius:999px;cursor:pointer;border:none;white-space:nowrap}
.badge-inactive{font-size:10px;background:#f0f0ee;color:#888;padding:3px 8px;border-radius:999px;cursor:pointer;border:none;white-space:nowrap}
.btn-del{font-size:11px;padding:3px 10px;border-radius:8px;border:1px solid #fca5a5;color:#dc2626;background:transparent;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-del:hover{background:#fef2f2}
.assign-user{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:14px}
.assign-user-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#5b21b6;flex-shrink:0}
.assign-name{font-size:13px;font-weight:500;color:#1a1a1a}
.assign-phone{font-size:11px;color:#888}
.assign-count{margin-left:auto;font-size:11px;color:#aaa}
.assign-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11px;padding:4px 10px;border-radius:999px;border:1px solid rgba(0,0,0,0.12);cursor:pointer;transition:all .15s;color:#666;background:#fff}
.chip:hover{border-color:rgba(0,0,0,0.25)}
.chip.on{background:#eff6ff;border-color:#3b82f6;color:#1e40af}
.stat-user{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:14px}
.stat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.stat-table{width:100%;font-size:11px;color:#666;border-collapse:collapse;table-layout:fixed}
.stat-table th{text-align:left;color:#aaa;font-weight:500;padding:0 8px 6px 0}
.stat-table th:not(:first-child){text-align:right}
.stat-table td{padding:5px 8px 5px 0;border-top:0.5px solid rgba(0,0,0,0.07);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stat-table td:not(:first-child){text-align:right}
.mini-bar{display:inline-flex;align-items:center;gap:4px}
.mini-track{width:40px;height:3px;background:#f0f0ee;border-radius:999px;overflow:hidden;display:inline-block;vertical-align:middle}
.mini-fill{height:100%;background:#3b82f6;border-radius:999px}
.csv-btn{font-size:11px;padding:5px 12px;border:1px solid rgba(0,0,0,0.12);border-radius:8px;color:#666;background:transparent;cursor:pointer;transition:all .15s}
.csv-btn:hover{background:#f0f0ee}
</style>
</head>
<body>
<div class="app">

<!-- LANDING -->
<div id="s-landing" class="screen active">
  <div>
    <div class="landing-title">강의 플랫폼</div>
    <div class="landing-sub">역할을 선택해 로그인하세요</div>
  </div>
  <div class="role-cards">
    <div class="role-card" onclick="go('s-login-student')">
      <div class="role-icon" style="background:#eff6ff">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="role-card-title">수강자</div>
      <div class="role-card-sub">이름 + 전화번호</div>
    </div>
    <div class="role-card" onclick="go('s-login-admin')">
      <div class="role-icon" style="background:#f5f3ff">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="role-card-title">관리자</div>
      <div class="role-card-sub">아이디 + 비밀번호</div>
    </div>
  </div>
</div>

<!-- STUDENT LOGIN -->
<div id="s-login-student" class="screen">
  <div class="login-box">
    <div>
      <div class="login-title">수강자 로그인</div>
      <div class="login-sub">처음 방문이면 자동으로 가입됩니다.</div>
    </div>
    <div class="field"><label>이름</label><input class="inp" id="st-name" placeholder="홍길동"/></div>
    <div class="field"><label>전화번호</label><input class="inp" id="st-phone" placeholder="01012345678" type="tel"/></div>
    <button class="btn-primary" onclick="studentLogin()">입장하기</button>
    <div class="back-link" onclick="go('s-landing')">← 처음으로</div>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="s-login-admin" class="screen">
  <div class="login-box">
    <div>
      <div class="login-title">관리자 로그인</div>
      <div class="login-sub">관리자 계정으로 로그인하세요.</div>
    </div>
    <div class="field"><label>아이디</label><input class="inp" id="ad-id" placeholder="admin"/></div>
    <div class="field"><label>비밀번호</label><input class="inp" type="password" id="ad-pw" placeholder="••••••••"/></div>
    <button class="btn-purple" onclick="adminLogin()">로그인</button>
    <div class="back-link" onclick="go('s-landing')">← 처음으로</div>
  </div>
</div>

<!-- STUDENT DASHBOARD -->
<div id="s-student" class="screen">
  <div class="hdr">
    <div class="hdr-title" id="st-greeting">내 강의</div>
    <button class="btn-sm" onclick="go('s-landing')">로그아웃</button>
  </div>
  <div class="s-body">
    <div class="sidebar" id="st-sidebar"></div>
    <div class="main-area" id="st-main">
      <div class="empty-state">
        <div class="empty-icon">▶</div>
        <span style="font-size:13px;color:#aaa">강의를 선택하세요</span>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="s-admin" class="screen">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:16px">
      <div class="hdr-title">관리자</div>
      <div class="hdr-nav">
        <button class="tab-btn on" id="tab-videos" onclick="adminTab('videos')">영상 관리</button>
        <button class="tab-btn" id="tab-assign" onclick="adminTab('assign')">강의 할당</button>
        <button class="tab-btn" id="tab-students" onclick="adminTab('students')">수강자 현황</button>
      </div>
    </div>
    <button class="btn-sm" onclick="go('s-landing')">로그아웃</button>
  </div>
  <div class="admin-body" id="admin-body"></div>
</div>

</div>
<script>
const state={
  currentStudent:null,selectedVideo:null,isPlaying:false,playedPct:0,
  playInterval:null,quizAnswers:{},quizSubmitted:{},adminTab:'videos',uploadPct:null,
  videos:[
    {id:'v1',title:'1강. JavaScript 기초',desc:'변수, 타입, 함수를 배웁니다.',duration:'18:24',order:1,active:true,date:'2025-03-10'},
    {id:'v2',title:'2강. React 핵심 개념',desc:'컴포넌트, Props, State를 배웁니다.',duration:'24:10',order:2,active:true,date:'2025-03-12'},
    {id:'v3',title:'3강. Next.js App Router',desc:'서버 컴포넌트와 라우팅을 배웁니다.',duration:'31:05',order:3,active:true,date:'2025-03-15'},
  ],
  students:[
    {id:'u1',name:'김민준',phone:'01012341234',progress:{v1:{pct:100,done:true,quiz:4},v2:{pct:72,done:false,quiz:null},v3:{pct:0,done:false,quiz:null}},assigned:['v1','v2','v3']},
    {id:'u2',name:'이서연',phone:'01098765432',progress:{v1:{pct:100,done:true,quiz:3},v2:{pct:100,done:true,quiz:5},v3:{pct:45,done:false,quiz:null}},assigned:['v1','v2','v3']},
    {id:'u3',name:'박도현',phone:'01055556666',progress:{v1:{pct:30,done:false,quiz:null},v2:{pct:0,done:false,quiz:null},v3:{pct:0,done:false,quiz:null}},assigned:['v1','v2']},
  ],
  quizzes:{
    v1:[
      {q:'JavaScript에서 변수를 선언하는 키워드가 아닌 것은?',opts:['var','let','const','def'],ans:3},
      {q:'함수를 선언하는 올바른 방법은?',opts:['function foo(){}','func foo(){}','def foo():','fn foo(){}'],ans:0},
    ],
    v2:[{q:'React에서 상태를 관리하는 Hook은?',opts:['useEffect','useState','useRef','useMemo'],ans:1}],
    v3:[{q:'Next.js App Router에서 서버 컴포넌트의 기본값은?',opts:['클라이언트 컴포넌트','서버 컴포넌트','공유 컴포넌트','동적 컴포넌트'],ans:1}],
  }
};

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='s-admin') renderAdminTab(state.adminTab);
}

function studentLogin(){
  const name=document.getElementById('st-name').value.trim()||'홍길동';
  const phone=document.getElementById('st-phone').value.trim()||'01012341234';
  const existing=state.students.find(s=>s.phone===phone.replace(/[^0-9]/g,''));
  if(existing){state.currentStudent=existing;}
  else{
    const ns={id:'u'+Date.now(),name,phone:phone.replace(/[^0-9]/g,''),progress:{},assigned:[]};
    state.students.push(ns);state.currentStudent=ns;
  }
  document.getElementById('st-greeting').textContent=state.currentStudent.name+'님의 강의';
  renderStudentSidebar();go('s-student');
}

function adminLogin(){go('s-admin');renderAdminTab('videos');}

function renderStudentSidebar(){
  const s=state.currentStudent;
  const vids=state.videos.filter(v=>v.active&&(s.assigned||[]).includes(v.id));
  const el=document.getElementById('st-sidebar');
  if(!vids.length){el.innerHTML='<div style="font-size:12px;color:#aaa;text-align:center;margin-top:20px">할당된 강의 없음</div>';return;}
  el.innerHTML=vids.map(v=>{
    const p=s.progress[v.id]||{pct:0,done:false,quiz:null};
    const sel=state.selectedVideo&&state.selectedVideo.id===v.id?' sel':'';
    const badge=p.done?(p.quiz!==null?'<span class="badge-done">완료</span>':'<span class="badge-quiz">퀴즈 대기</span>'):'';
    const bar=!p.done&&p.pct>0?`<div class="prog-bar-wrap"><div class="prog-label"><span>진도</span><span>${p.pct}%</span></div><div class="prog-bar"><div class="prog-fill" style="width:${p.pct}%"></div></div></div>`:'';
    const qt=p.done&&p.quiz!==null?`<div style="font-size:10px;color:#aaa;margin-top:3px">퀴즈 ${p.quiz}점</div>`:'';
    return `<div class="vcard${sel}" onclick="selectVideo('${v.id}')"><div class="vcard-title"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.title}</span>${badge}</div>${bar}${qt}</div>`;
  }).join('');
}

function selectVideo(vid){
  const v=state.videos.find(x=>x.id===vid);
  state.selectedVideo=v;state.isPlaying=false;clearInterval(state.playInterval);
  const p=state.currentStudent.progress[vid]||{pct:0,done:false,quiz:null};
  state.playedPct=p.pct;renderStudentSidebar();renderPlayer(v,p);
}

function renderPlayer(v,p){
  const main=document.getElementById('st-main');
  const quizDone=p.done&&p.quiz!==null;
  const quizPending=p.done&&p.quiz===null;
  main.innerHTML=`
  <div class="player-card">
    <div class="player-title">${v.title}</div>
    <div class="player-desc">${v.desc}</div>
    <div class="player-box" id="player-box" onclick="togglePlay('${v.id}')">
      <div id="player-overlay" style="position:absolute;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center">
        <div class="play-btn"><div id="play-arrow" class="play-arrow"></div></div>
      </div>
      <div class="blocked-toast" id="blocked-toast">⚠ 탐색바 이동은 허용되지 않습니다</div>
      ${p.done?'<div style="position:absolute;top:8px;right:8px;background:#22c55e;color:#fff;font-size:10px;font-weight:500;padding:3px 8px;border-radius:999px">수강완료</div>':''}
    </div>
    <div class="progress-track" onclick="seekBlocked(event)"><div class="progress-played" id="prog-played" style="width:${state.playedPct}%"></div></div>
    <div class="player-btns">
      <div class="ctrl-btn" onclick="togglePlay('${v.id}')"><span id="ctrl-icon">▶</span></div>
      <div class="ctrl-btn" onclick="seekBlocked()" title="되감기 차단">⏮</div>
      <div class="ctrl-btn" onclick="seekBlocked()" title="빨리감기 차단">⏭</div>
      <span class="time-label" id="time-label">${formatTime(state.playedPct,v.duration)}</span>
    </div>
  </div>
  ${quizPending?`<div class="quiz-bar"><div class="quiz-bar-title">수강 완료! 퀴즈를 응시하세요.</div>${renderQuizHTML(v.id)}</div>`:''}
  ${quizDone?`<div class="done-bar"><span style="font-size:14px">✓</span><div><div style="font-weight:500">수강 및 퀴즈 완료</div><div style="font-size:11px;margin-top:1px">퀴즈 점수: ${p.quiz}점 / ${(state.quizzes[v.id]||[]).length}점</div></div></div>`:''}`;
}

function renderQuizHTML(vid){
  const qs=state.quizzes[vid]||[];
  if(!qs.length) return '<div style="font-size:12px;color:#888">퀴즈가 없습니다.</div>';
  if(state.quizSubmitted[vid]){
    const correct=qs.filter((q,i)=>state.quizAnswers[vid][i]===q.ans).length;
    return `<div class="quiz-result"><div class="quiz-score">${correct} / ${qs.length}</div><div style="font-size:12px;color:#888;margin-top:4px">${correct===qs.length?'완벽합니다!':correct>=qs.length/2?'잘 하셨습니다!':'다시 복습해보세요.'}</div></div>`;
  }
  if(!state.quizAnswers[vid]) state.quizAnswers[vid]=new Array(qs.length).fill(-1);
  return `<div class="quiz-wrap">${qs.map((q,qi)=>`<div><div class="quiz-q">${qi+1}. ${q.q}</div><div class="quiz-opts">${q.opts.map((o,oi)=>`<button class="quiz-opt${state.quizAnswers[vid][qi]===oi?' sel':''}" onclick="selectOpt('${vid}',${qi},${oi})">${o}</button>`).join('')}</div></div>`).join('')}<button class="btn-primary" style="width:auto;padding:7px 20px;margin-top:4px" onclick="submitQuiz('${vid}')">제출하기</button></div>`;
}

function selectOpt(vid,qi,oi){
  if(!state.quizAnswers[vid]) state.quizAnswers[vid]=[];
  state.quizAnswers[vid][qi]=oi;
  const v=state.videos.find(x=>x.id===vid);
  const p=state.currentStudent.progress[vid]||{pct:100,done:true,quiz:null};
  renderPlayer(v,p);
}

function submitQuiz(vid){
  const qs=state.quizzes[vid]||[];
  const ans=state.quizAnswers[vid]||[];
  if(ans.some(a=>a===-1)){alert('모든 문제에 답해주세요.');return;}
  state.quizSubmitted[vid]=true;
  const score=qs.filter((q,i)=>ans[i]===q.ans).length;
  state.currentStudent.progress[vid]={pct:100,done:true,quiz:score};
  renderPlayer(state.videos.find(x=>x.id===vid),state.currentStudent.progress[vid]);
  renderStudentSidebar();
}

function togglePlay(vid){
  state.isPlaying=!state.isPlaying;
  const icon=document.getElementById('ctrl-icon');
  const arrow=document.getElementById('play-arrow');
  const overlay=document.getElementById('player-overlay');
  if(icon) icon.textContent=state.isPlaying?'❚❚':'▶';
  if(arrow){
    if(state.isPlaying){arrow.style.cssText='width:4px;height:16px;background:white;border-radius:1px;box-shadow:6px 0 0 white';}
    else{arrow.style.cssText='width:0;height:0;border-top:11px solid transparent;border-bottom:11px solid transparent;border-left:18px solid white;margin-left:3px';}
  }
  if(overlay) overlay.style.opacity=state.isPlaying?'0':'1';
  clearInterval(state.playInterval);
  if(state.isPlaying){
    state.playInterval=setInterval(()=>{
      const s=state.currentStudent;
      const p=s.progress[vid]||{pct:0,done:false,quiz:null};
      if(p.done){clearInterval(state.playInterval);return;}
      state.playedPct=Math.min(100,state.playedPct+0.8);
      const pp=document.getElementById('prog-played');
      const tl=document.getElementById('time-label');
      const v=state.videos.find(x=>x.id===vid);
      if(pp) pp.style.width=state.playedPct+'%';
      if(tl) tl.textContent=formatTime(state.playedPct,v.duration);
      s.progress[vid]={pct:Math.round(state.playedPct),done:false,quiz:null};
      if(state.playedPct>=100){
        clearInterval(state.playInterval);state.isPlaying=false;
        s.progress[vid]={pct:100,done:true,quiz:null};
        renderPlayer(v,s.progress[vid]);renderStudentSidebar();
      }
    },80);
  }
}

function seekBlocked(e){
  if(e) e.stopPropagation();
  const t=document.getElementById('blocked-toast');
  if(!t) return;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
}

function formatTime(pct,dur){
  const parts=dur.split(':').map(Number);
  const total=parts[0]*60+parts[1];
  const elapsed=Math.round((pct/100)*total);
  return `${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')} / ${dur}`;
}

function adminTab(t){
  state.adminTab=t;
  ['videos','assign','students'].forEach(k=>{document.getElementById('tab-'+k).classList.toggle('on',k===t);});
  renderAdminTab(t);
}

function renderAdminTab(t){
  const el=document.getElementById('admin-body');
  if(t==='videos') el.innerHTML=renderVideosTab();
  else if(t==='assign') el.innerHTML=renderAssignTab();
  else el.innerHTML=renderStatsTab();
}

function renderVideosTab(){
  const barHtml=state.uploadPct!==null?`<div style="margin:8px 0"><div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:4px"><span>업로드 중...</span><span>${Math.round(state.uploadPct)}%</span></div><div class="up-bar-wrap"><div class="up-bar" style="width:${state.uploadPct}%"></div></div></div>`:'';
  const rows=state.videos.map(v=>`<div class="video-row"><div class="video-info"><div class="video-name">${v.title}</div><div class="video-meta">순서 ${v.order} · ${v.date} · ${v.duration}</div></div><button class="${v.active?'badge-active':'badge-inactive'}" onclick="toggleVideoActive('${v.id}')">${v.active?'활성':'비활성'}</button><button class="btn-del" onclick="deleteVideo('${v.id}')">삭제</button></div>`).join('');
  return `<div class="card"><div class="card-title">새 강의 업로드</div><div class="form-grid"><input class="inp" placeholder="제목 *" id="up-title"/><input class="inp" placeholder="순서" type="number" value="${state.videos.length+1}"/></div><input class="inp" placeholder="설명 (선택)" style="margin-bottom:8px"/><div style="margin-bottom:8px"><div style="font-size:11px;font-weight:500;color:#888;margin-bottom:6px">퀴즈 (선택)</div><input class="inp" placeholder="Q1. 문제를 입력하세요" style="margin-bottom:4px"/><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px"><input class="inp" style="font-size:11px" placeholder="선택지 1"/><input class="inp" style="font-size:11px" placeholder="선택지 2"/><input class="inp" style="font-size:11px" placeholder="선택지 3"/><input class="inp" style="font-size:11px" placeholder="선택지 4"/></div></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;color:#666;border:1px solid rgba(0,0,0,0.12);padding:5px 10px;border-radius:8px;cursor:pointer;white-space:nowrap" onclick="document.getElementById('fInput').click()">파일 선택</div><span style="font-size:11px;color:#aaa" id="fname">선택된 파일 없음</span><input type="file" accept="video/*" style="display:none" id="fInput" onchange="document.getElementById('fname').textContent=this.files[0]?.name||'선택된 파일 없음'"/></div>${barHtml}<button class="btn-purple" onclick="simulateUpload()">업로드</button></div><div class="card"><div class="card-title">강의 목록 (${state.videos.length}개)</div>${rows}</div>`;
}

function simulateUpload(){
  const title=document.getElementById('up-title')?.value||'새 강의';
  state.uploadPct=0;renderAdminTab('videos');
  const iv=setInterval(()=>{
    state.uploadPct=Math.min(100,(state.uploadPct||0)+3);
    const bar=document.querySelector('.up-bar');
    const lbl=document.querySelector('.up-bar-wrap')?.previousElementSibling?.querySelector('span:last-child');
    if(bar) bar.style.width=state.uploadPct+'%';
    if(lbl) lbl.textContent=Math.round(state.uploadPct)+'%';
    if(state.uploadPct>=100){
      clearInterval(iv);
      state.videos.push({id:'v'+Date.now(),title:title||'새 강의',desc:'새로 업로드된 강의입니다.',duration:'00:00',order:state.videos.length+1,active:true,date:new Date().toISOString().slice(0,10)});
      state.uploadPct=null;renderAdminTab('videos');
    }
  },60);
}

function toggleVideoActive(id){
  const v=state.videos.find(x=>x.id===id);if(v) v.active=!v.active;renderAdminTab('videos');
}
function deleteVideo(id){
  if(!confirm('정말 삭제하시겠습니까?')) return;
  state.videos=state.videos.filter(v=>v.id!==id);renderAdminTab('videos');
}

function renderAssignTab(){
  return state.students.map(s=>`<div class="assign-user"><div class="assign-user-hdr"><div class="avatar">${s.name[0]}</div><div><div class="assign-name">${s.name}</div><div class="assign-phone">${s.phone}</div></div><div class="assign-count">${s.assigned.length} / ${state.videos.filter(v=>v.active).length}개 할당</div></div><div class="assign-chips">${state.videos.filter(v=>v.active).map(v=>`<div class="chip${s.assigned.includes(v.id)?' on':''}" onclick="toggleAssign('${s.id}','${v.id}')">${s.assigned.includes(v.id)?'✓ ':''}${v.title}</div>`).join('')}</div></div>`).join('');
}

function toggleAssign(uid,vid){
  const s=state.students.find(x=>x.id===uid);if(!s) return;
  if(s.assigned.includes(vid)) s.assigned=s.assigned.filter(x=>x!==vid);
  else s.assigned.push(vid);
  renderAdminTab('assign');
}

function renderStatsTab(){
  const rows=state.students.map(s=>{
    const progs=state.videos.map(v=>{
      const p=s.progress[v.id]||{pct:0,done:false,quiz:null};
      return `<tr><td>${v.title}</td><td><div class="mini-bar"><div class="mini-track"><div class="mini-fill" style="width:${p.pct}%"></div></div>${p.pct}%</div></td><td>${p.done?'<span style="color:#16a34a;font-weight:500">완료</span>':'<span style="color:#ddd">-</span>'}</td><td>${p.quiz!==null?`<span style="color:#1d4ed8;font-weight:500">${p.quiz}점</span>`:'<span style="color:#ddd">-</span>'}</td></tr>`;
    }).join('');
    const completed=Object.values(s.progress).filter(p=>p.done).length;
    return `<div class="stat-user"><div class="stat-hdr"><div class="avatar">${s.name[0]}</div><div><div style="font-size:13px;font-weight:500;color:#1a1a1a">${s.name}</div><div style="font-size:11px;color:#888">${s.phone}</div></div><div style="margin-left:auto;display:flex;gap:10px;font-size:11px;color:#aaa"><span>총 ${Object.keys(s.progress).length}강의</span><span style="color:#16a34a">${completed}완료</span></div></div><div style="overflow-x:auto"><table class="stat-table"><thead><tr><th style="width:40%">강의</th><th>진도</th><th>완료</th><th>퀴즈</th></tr></thead><tbody>${progs}</tbody></table></div></div>`;
  }).join('');
  return `<div style="display:flex;justify-content:flex-end;margin-bottom:4px"><button class="csv-btn" onclick="alert('실제 서비스에서는 수강현황.csv 파일이 다운로드됩니다.')">CSV 다운로드</button></div>${rows}`;
}
</script>
</body>
</html>
