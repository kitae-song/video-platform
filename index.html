<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>강의 플랫폼</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;min-height:100vh}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
.inp{width:100%;border:1px solid rgba(0,0,0,0.15);border-radius:10px;padding:12px 14px;font-size:16px;color:#1a1a1a;background:#fff;outline:none;-webkit-appearance:none;transition:border-color .15s;touch-action:manipulation;-webkit-user-select:text;user-select:text}
.inp:focus{border-color:#3b82f6}
.btn-blue{width:100%;background:#3b82f6;color:#fff;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:500;cursor:pointer}
.btn-blue:active{background:#2563eb}
.btn-purple{width:100%;background:#7c3aed;color:#fff;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:500;cursor:pointer}
.btn-purple:active{background:#6d28d9}
.btn-outline{background:transparent;border:1px solid rgba(0,0,0,0.15);color:#666;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer}
.btn-outline:active{background:#f0f0ee}
.hdr{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100}
.hdr-title{font-size:16px;font-weight:500;color:#1a1a1a}
#s-landing{align-items:center;justify-content:center;padding:32px 24px;gap:36px}
.landing-title{font-size:28px;font-weight:500;color:#1a1a1a;text-align:center}
.landing-sub{font-size:15px;color:#888;text-align:center;margin-top:8px}
.role-cards{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
.role-card{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:14px;padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer}
.role-card:active{background:#f9f9f8}
.role-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.role-card-title{font-size:15px;font-weight:500;color:#1a1a1a}
.role-card-sub{font-size:13px;color:#888;margin-top:2px}
.role-arrow{margin-left:auto;color:#ccc;font-size:20px;line-height:1}
#s-login-student,#s-login-admin{justify-content:center;padding:24px}
.login-box{width:100%;max-width:400px;margin:0 auto;background:#fff;border-radius:16px;padding:28px 24px;display:flex;flex-direction:column;gap:18px;border:1px solid rgba(0,0,0,0.08)}
.login-title{font-size:20px;font-weight:500;color:#1a1a1a}
.login-sub{font-size:13px;color:#888;margin-top:3px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:500;color:#555}
.back-link{text-align:center;font-size:13px;color:#aaa;cursor:pointer;padding:4px}
#s-student{background:#f5f5f3}
.student-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.vcard{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,0.08);padding:14px 16px;cursor:pointer}
.vcard:active{background:#fafafa}
.vcard.sel{border-color:#3b82f6;background:#eff6ff}
.vcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.vcard-title{font-size:14px;font-weight:500;color:#1a1a1a;line-height:1.4}
.badge-done{font-size:11px;background:#dcfce7;color:#166534;padding:3px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.badge-quiz{font-size:11px;background:#fef3c7;color:#92400e;padding:3px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.vcard-type{font-size:10px;color:#aaa;margin-top:2px}
/* 플레이어 공통 */
.player-card{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,0.08);overflow:hidden}
.player-info{padding:14px 16px 10px}
.player-title{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:4px}
.player-desc{font-size:13px;color:#888}
.notice-box{margin:0 16px 10px;border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.7}
.notice-gdrive{background:#fef9c3;border:1px solid #fde68a;color:#92400e}
.notice-file{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
/* 구글 드라이브 플레이어 */
.gdrive-box{aspect-ratio:16/9;background:#111;overflow:hidden}
.gdrive-box iframe{width:100%;height:100%;border:none;display:block}
/* 직접 업로드 플레이어 */
.video-wrap{aspect-ratio:16/9;background:#111;position:relative;overflow:hidden}
.video-wrap video{width:100%;height:100%;display:block;outline:none}
.video-overlay{position:absolute;inset:0;z-index:2}
.skip-toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;font-size:12px;padding:7px 14px;border-radius:8px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;z-index:10}
.skip-toast.show{opacity:1}
/* 진행바 (직접 업로드용) */
.video-progress-wrap{padding:10px 16px 6px}
.video-progress-bg{height:5px;background:#f0f0ee;border-radius:999px;overflow:hidden;cursor:not-allowed}
.video-progress-fill{height:100%;background:#3b82f6;border-radius:999px;transition:width .3s}
.video-time{font-size:11px;color:#aaa;margin-top:4px;padding:0 16px}
/* 타이머 (구글 드라이브용) */
.timer-wrap{padding:10px 16px 6px;display:flex;flex-direction:column;gap:5px}
.timer-bar-bg{height:5px;background:#f0f0ee;border-radius:999px;overflow:hidden}
.timer-bar-fill{height:100%;background:#3b82f6;border-radius:999px;transition:width 1s linear}
.timer-row{display:flex;justify-content:space-between;font-size:11px;color:#aaa}
/* 완료 버튼 */
.btn-complete{width:100%;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;-webkit-appearance:none}
.btn-complete.locked{background:#e5e7eb;color:#aaa;cursor:not-allowed}
.btn-complete.unlocked{background:#16a34a;color:#fff}
.btn-complete.unlocked:active{background:#15803d}
.complete-wrap{padding:10px 16px 14px}
.done-bar{margin:10px 16px 14px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:8px;font-size:13px;color:#166534}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 0}
.quiz-card{background:#fff;border-radius:12px;border:1px solid #bfdbfe;overflow:hidden}
.quiz-card-hdr{background:#eff6ff;padding:12px 16px;font-size:13px;font-weight:500;color:#1e40af}
.quiz-card-body{padding:16px;display:flex;flex-direction:column;gap:18px}
.quiz-q{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:8px}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:12px 14px;border:1px solid rgba(0,0,0,0.12);border-radius:10px;cursor:pointer;font-size:14px;color:#1a1a1a;background:#fff;text-align:left;width:100%;-webkit-appearance:none}
.quiz-opt:active{background:#f5f5f3}
.quiz-opt.sel{border-color:#3b82f6;background:#eff6ff;color:#1e40af}
.quiz-result{text-align:center;padding:20px 16px;background:#f5f5f3;border-radius:8px}
.quiz-score{font-size:36px;font-weight:500;color:#3b82f6}
.quiz-msg{font-size:14px;color:#666;margin-top:6px}
#s-admin{background:#f5f5f3}
.admin-tabs{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);display:flex;overflow-x:auto;flex-shrink:0}
.admin-tabs::-webkit-scrollbar{display:none}
.atab{padding:13px 18px;font-size:13px;font-weight:500;color:#888;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;background:transparent;border-top:none;border-left:none;border-right:none;-webkit-appearance:none}
.atab.on{color:#7c3aed;border-bottom-color:#7c3aed}
.admin-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,0.08);padding:16px;display:flex;flex-direction:column;gap:12px}
.card-title{font-size:14px;font-weight:500;color:#1a1a1a}
.help-box{border-radius:8px;padding:12px;font-size:12px;line-height:1.9}
.help-blue{background:#f0f7ff;border:1px solid #bfdbfe;color:#1e3a5f}
.help-yellow{background:#fefce8;border:1px solid #fde68a;color:#713f12}
.help-box b{font-weight:500}
/* 업로드 타입 탭 */
.type-tabs{display:flex;border:1px solid rgba(0,0,0,0.12);border-radius:10px;overflow:hidden}
.type-tab{flex:1;padding:10px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;background:#fff;color:#888;border:none;-webkit-appearance:none;transition:all .15s}
.type-tab.on{background:#7c3aed;color:#fff}
.file-select-row{display:flex;align-items:center;gap:10px}
.file-select-btn{font-size:13px;color:#666;border:1px solid rgba(0,0,0,0.15);padding:9px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;background:#fff;-webkit-appearance:none}
.file-name{font-size:12px;color:#aaa;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.up-bar-wrap{height:5px;background:#f0f0ee;border-radius:999px;overflow:hidden}
.up-bar{height:100%;background:#7c3aed;border-radius:999px;transition:width .3s}
.video-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.video-row:last-child{border-bottom:none;padding-bottom:0}
.video-row:first-child{padding-top:0}
.video-info{flex:1;min-width:0}
.video-name{font-size:13px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.video-meta{font-size:11px;color:#aaa;margin-top:2px}
.vtag{font-size:10px;padding:2px 6px;border-radius:4px;margin-right:4px}
.vtag-file{background:#eff6ff;color:#1d4ed8}
.vtag-gdrive{background:#fef9c3;color:#92400e}
.badge-active{font-size:11px;background:#dcfce7;color:#166534;padding:4px 10px;border-radius:999px;cursor:pointer;border:none;-webkit-appearance:none}
.badge-inactive{font-size:11px;background:#f0f0ee;color:#888;padding:4px 10px;border-radius:999px;cursor:pointer;border:none;-webkit-appearance:none}
.btn-del{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid #fca5a5;color:#dc2626;background:transparent;cursor:pointer;-webkit-appearance:none}
.btn-del:active{background:#fef2f2}
.avatar{width:36px;height:36px;border-radius:50%;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#5b21b6;flex-shrink:0}
.assign-chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-size:12px;padding:6px 12px;border-radius:999px;border:1px solid rgba(0,0,0,0.12);cursor:pointer;color:#666;background:#fff;-webkit-appearance:none}
.chip.on{background:#eff6ff;border-color:#3b82f6;color:#1e40af}
.stat-vrow{display:flex;align-items:center;justify-content:space-between;font-size:12px;gap:8px;padding:5px 0;border-top:0.5px solid rgba(0,0,0,0.06)}
.stat-vtitle{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#888}
.csv-btn{font-size:12px;padding:7px 14px;border:1px solid rgba(0,0,0,0.12);border-radius:8px;color:#666;background:transparent;cursor:pointer;align-self:flex-end;-webkit-appearance:none}
.csv-btn:active{background:#f0f0ee}
@media(min-width:640px){
  body{display:flex;align-items:center;justify-content:center;padding:20px}
  .screen{min-height:0;border-radius:14px;overflow:hidden;border:1px solid rgba(0,0,0,0.08);box-shadow:0 4px 24px rgba(0,0,0,0.06);max-width:480px;width:100%}
  .screen.active{min-height:600px}
  #s-student,#s-admin{max-width:720px}
}
</style>
</head>
<body>

<!-- 랜딩 -->
<div id="s-landing" class="screen active">
  <div>
    <div class="landing-title">강의 플랫폼</div>
    <div class="landing-sub">역할을 선택해 로그인하세요</div>
  </div>
  <div class="role-cards">
    <div class="role-card" onclick="go('s-login-student')">
      <div class="role-icon" style="background:#eff6ff">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div>
        <div class="role-card-title">수강자</div>
        <div class="role-card-sub">이름 + 전화번호로 입장</div>
      </div>
      <div class="role-arrow">›</div>
    </div>
    <div class="role-card" onclick="go('s-login-admin')">
      <div class="role-icon" style="background:#f5f3ff">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div>
        <div class="role-card-title">관리자</div>
        <div class="role-card-sub">아이디 + 비밀번호로 입장</div>
      </div>
      <div class="role-arrow">›</div>
    </div>
  </div>
</div>

<!-- 수강자 로그인 -->
<div id="s-login-student" class="screen">
  <div class="login-box">
    <div>
      <div class="login-title">수강자 로그인</div>
      <div class="login-sub">처음 방문이면 자동으로 가입됩니다.</div>
    </div>
    <div class="field">
      <label>이름</label>
      <input class="inp" id="st-name" placeholder="홍길동" autocomplete="name" autocorrect="off" autocapitalize="off" spellcheck="false" lang="ko" inputmode="text"/>
    </div>
    <div class="field">
      <label>전화번호</label>
      <input class="inp" id="st-phone" placeholder="01012345678" type="tel" autocomplete="tel" inputmode="numeric"/>
    </div>
    <button class="btn-blue" onclick="studentLogin()">입장하기</button>
    <div class="back-link" onclick="go('s-landing')">← 처음으로</div>
  </div>
</div>

<!-- 관리자 로그인 -->
<div id="s-login-admin" class="screen">
  <div class="login-box">
    <div>
      <div class="login-title">관리자 로그인</div>
      <div class="login-sub">관리자 계정으로 로그인하세요.</div>
    </div>
    <div class="field">
      <label>아이디</label>
      <input class="inp" id="ad-id" placeholder="admin" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input class="inp" type="password" id="ad-pw" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-purple" onclick="adminLogin()">로그인</button>
    <div class="back-link" onclick="go('s-landing')">← 처음으로</div>
  </div>
</div>

<!-- 수강자 대시보드 -->
<div id="s-student" class="screen">
  <div class="hdr">
    <div class="hdr-title" id="st-greeting">내 강의</div>
    <button class="btn-outline" onclick="logout()">로그아웃</button>
  </div>
  <div class="student-body" id="student-body">
    <div class="empty-state">
      <div style="width:52px;height:52px;border-radius:50%;background:#f0f0ee;display:flex;align-items:center;justify-content:center;font-size:22px;color:#ccc">▶</div>
      <span style="font-size:14px;color:#aaa">강의를 선택하세요</span>
    </div>
  </div>
</div>

<!-- 관리자 대시보드 -->
<div id="s-admin" class="screen">
  <div class="hdr">
    <div class="hdr-title">관리자</div>
    <button class="btn-outline" onclick="logout()">로그아웃</button>
  </div>
  <div class="admin-tabs">
    <button class="atab on" id="tab-videos" onclick="adminTab('videos')">영상 관리</button>
    <button class="atab" id="tab-assign" onclick="adminTab('assign')">강의 할당</button>
    <button class="atab" id="tab-students" onclick="adminTab('students')">수강자 현황</button>
  </div>
  <div class="admin-body" id="admin-body"></div>
</div>

<script>
/* ══════════════════════════════
   ★ 관리자 계정 — 여기서 변경 ★
   ══════════════════════════════ */
var ADMIN_ID = 'admin';
var ADMIN_PW = '1234';

var S = {
  student: null,
  selectedVid: null,
  quizAnswers: {},
  quizSubmitted: {},
  curAdminTab: 'videos',
  uploadType: 'file',
  pendingFileUrl: null,
  pendingFileName: '',
  timerInterval: null,
  timerRemaining: 0,
  timerTotal: 0,
  videos: [
    {id:'v1',title:'1강. JavaScript 기초',desc:'변수, 타입, 함수를 배웁니다.',type:'gdrive',src:'https://drive.google.com/file/d/1lFnN0DluPaHRGm3GmcCVEBbobAXQOVio/preview',duration:30,order:1,active:true,date:'2025-03-10'},
    {id:'v2',title:'2강. React 핵심 개념',desc:'컴포넌트, Props, State를 배웁니다.',type:'gdrive',src:'https://drive.google.com/file/d/1lFnN0DluPaHRGm3GmcCVEBbobAXQOVio/preview',duration:40,order:2,active:true,date:'2025-03-12'},
  ],
  students: [
    {id:'u1',name:'김민준',phone:'01012341234',progress:{},assigned:['v1','v2']},
    {id:'u2',name:'이서연',phone:'01098765432',progress:{},assigned:['v1','v2']},
  ],
  quizzes: {
    v1:[
      {q:'JavaScript에서 변수를 선언하는 키워드가 아닌 것은?',opts:['var','let','const','def'],ans:3},
      {q:'함수를 선언하는 올바른 방법은?',opts:['function foo(){}','func foo(){}','def foo():','fn foo(){}'],ans:0},
    ],
    v2:[{q:'React에서 상태를 관리하는 Hook은?',opts:['useEffect','useState','useRef','useMemo'],ans:1}],
  }
};

/* ── 유틸 ── */
function toEmbed(url) {
  var m1 = url.match(/\/file\/d\/([^\/\?]+)/);
  var m2 = url.match(/[?&]id=([^&]+)/);
  var id = m1 ? m1[1] : m2 ? m2[1] : null;
  return id ? 'https://drive.google.com/file/d/' + id + '/preview' : null;
}
function pad2(n){ return String(n).padStart(2,'0'); }
function fmtSec(s){ s=Math.max(0,Math.round(s)); return pad2(Math.floor(s/60))+':'+pad2(s%60); }

function go(id) {
  document.querySelectorAll('.screen').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if (id==='s-admin') renderAdminTab(S.curAdminTab);
}
function logout() {
  clearTimer();
  S.student=null; S.selectedVid=null;
  go('s-landing');
}

/* ── 타이머 (구글 드라이브용) ── */
function clearTimer() {
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval=null; }
}
function startTimer(vid) {
  clearTimer();
  var v = S.videos.find(function(x){ return x.id===vid; });
  var p = S.student.progress[vid]||{done:false,quiz:null,elapsed:0};
  var total = v.duration||600;
  S.timerTotal = total;
  S.timerRemaining = Math.max(0, total-(p.elapsed||0));
  updateTimerUI(p.elapsed||0, total);
  if (S.timerRemaining<=0){ unlockBtn(vid); return; }
  S.timerInterval = setInterval(function(){
    if (document.hidden) return;
    S.timerRemaining = Math.max(0, S.timerRemaining-1);
    var el = total - S.timerRemaining;
    if (!S.student.progress[vid]) S.student.progress[vid]={done:false,quiz:null,elapsed:0};
    S.student.progress[vid].elapsed = el;
    updateTimerUI(el, total);
    if (S.timerRemaining<=0){ clearTimer(); unlockBtn(vid); }
  }, 1000);
}
function updateTimerUI(elapsed, total) {
  var pct = Math.min(100, Math.round((elapsed/total)*100));
  var fill = document.getElementById('timer-fill');
  var lbl = document.getElementById('timer-remaining');
  if (fill) fill.style.width = pct+'%';
  if (lbl) lbl.textContent = S.timerRemaining<=0 ? '시청 완료!' : '남은 시간 '+fmtSec(S.timerRemaining);
}
function unlockBtn(vid) {

/* ── 수강자 화면 ── */
function renderStudentBody() {
  var s = S.student;
  var vids = S.videos.filter(function(v){ return v.active&&s.assigned.includes(v.id); });
  var body = document.getElementById('student-body');
  if (!vids.length){
    body.innerHTML='<div class="empty-state"><div style="width:52px;height:52px;border-radius:50%;background:#f0f0ee;display:flex;align-items:center;justify-content:center;font-size:22px;color:#ccc">▶</div><span style="font-size:14px;color:#aaa">할당된 강의가 없습니다</span></div>';
    return;
  }
  var playerHTML='';
  if (S.selectedVid){
    var pv=S.videos.find(function(x){ return x.id===S.selectedVid; });
    var pp=S.student.progress[S.selectedVid]||{done:false,quiz:null,elapsed:0};
    playerHTML=buildPlayerHTML(pv,pp);
  }
  var listHTML=vids.map(function(v){
    var p=s.progress[v.id]||{done:false,quiz:null,elapsed:0};
    var isSel=S.selectedVid===v.id;
    var badge=p.done?(p.quiz!==null?'<span class="badge-done">완료</span>':'<span class="badge-quiz">퀴즈 대기</span>'):'';
    var qt=(p.done&&p.quiz!==null)?'<div style="font-size:11px;color:#aaa;margin-top:4px">퀴즈 '+p.quiz+'점</div>':'';
    var typeTag='<div class="vcard-type">'+(v.type==='file'?'직접 업로드':'구글 드라이브')+'</div>';
    return '<div class="vcard'+(isSel?' sel':'')+'" onclick="selectVideo(\''+v.id+'\')"><div class="vcard-top"><div class="vcard-title">'+v.title+'</div>'+badge+'</div>'+typeTag+qt+'</div>';
  }).join('');
  body.innerHTML=playerHTML+listHTML;
  // 직접 업로드 영상이면 비디오 이벤트 바인딩
  if (S.selectedVid){
    var sv=S.videos.find(function(x){ return x.id===S.selectedVid; });
    if (sv&&sv.type==='file') bindVideoEvents(S.selectedVid);
  }
}

function buildPlayerHTML(v, p) {
  var quizPending=p.done&&p.quiz===null;
  var quizDone=p.done&&p.quiz!==null;
  var playerSection='';

  if (v.type==='file') {
    /* ── 직접 업로드: <video> 태그 + seek 차단 ── */
    var watchedPct=p.done?100:0;
    playerSection=
      '<div class="notice-box notice-file">스킵 방지 적용 중 — 앞으로 건너뛰기가 차단됩니다. 되감기는 가능합니다.</div>'
      +'<div class="video-wrap"><video id="main-video" src="'+v.src+'" controls controlslist="nodownload nofullscreen noremoteplayback" disablepictureinpicture oncontextmenu="return false"></video>'
      +'<div class="video-overlay" id="video-overlay"></div>'
      +'<div class="skip-toast" id="skip-toast">⚠ 앞으로 건너뛰기는 허용되지 않습니다</div>'
      +'</div>'
      +'<div class="video-progress-wrap"><div class="video-progress-bg"><div class="video-progress-fill" id="vid-prog" style="width:'+watchedPct+'%"></div></div></div>'
      +'<div class="video-time" id="vid-time">0:00 / 0:00</div>';
  } else {
    /* ── 구글 드라이브: iframe + 타이머 ── */
    var total=v.duration||600;
    var elapsed=p.elapsed||0;
    var pct=p.done?100:Math.min(100,Math.round((elapsed/total)*100));
    var remaining=Math.max(0,total-elapsed);
    var isUnlocked=p.done||remaining<=0;
    playerSection=
      '<div class="notice-box notice-gdrive">⚠ 영상을 <b>끝까지 시청</b>해야 완료 버튼이 활성화됩니다.</div>'
      +'<div class="gdrive-box"><iframe src="'+v.src+'" allowfullscreen></iframe></div>'
      +(!p.done?'<div class="timer-wrap"><div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-fill" style="width:'+pct+'%"></div></div><div class="timer-row"><span>시청 진행률 '+pct+'%</span><span id="timer-remaining">'+(isUnlocked?'시청 완료!':'남은 시간 '+fmtSec(remaining))+'</span></div></div>':'');
  }

  /* 완료 버튼 / 완료 바 */
  var footerHTML='';
  if (!p.done){
    if (v.type==='gdrive'){
      var total2=v.duration||600;
      var elapsed2=p.elapsed||0;
      var isUnlocked2=elapsed2>=total2;
      var onclickAttr = isUnlocked2 ? ' onclick="markComplete(\'' + v.id + '\')"' : '';
      footerHTML='<div class="complete-wrap"><button id="complete-btn" class="btn-complete '+(isUnlocked2?'unlocked':'locked')+'"'+onclickAttr+'>'+(isUnlocked2?'✓ 안전교육 완료':'영상을 끝까지 시청하면 활성화됩니다')+'</button></div>';
    }
    // 직접 업로드는 video ended 이벤트로 처리
  } else {
    footerHTML='<div class="done-bar"><span style="font-size:16px">✓</span><span style="font-weight:500">안전교육 완료</span></div>';
  }

  var quizHTML='';
  if (quizPending) quizHTML='<div class="quiz-card"><div class="quiz-card-hdr">수강 완료! 퀴즈를 응시하세요.</div><div class="quiz-card-body">'+buildQuizHTML(v.id)+'</div></div>';
  if (quizDone) quizHTML='<div class="card" style="flex-direction:row;align-items:center;gap:10px"><span style="font-size:20px">🏆</span><div><div style="font-size:14px;font-weight:500;color:#1a1a1a">수강 및 퀴즈 완료</div><div style="font-size:12px;color:#888;margin-top:2px">퀴즈 점수 '+p.quiz+'점 / '+(S.quizzes[v.id]||[]).length+'점</div></div></div>';

  return '<div class="player-card">'
    +'<div class="player-info"><div class="player-title">'+v.title+'</div>'+(v.desc?'<div class="player-desc">'+v.desc+'</div>':'')+'</div>'
    +playerSection+footerHTML+'</div>'+quizHTML;
}

/* ── 직접 업로드 영상 이벤트 바인딩 ── */
function bindVideoEvents(vid) {
  var video=document.getElementById('main-video');
  if (!video) return;
  var maxReached=0;
  var toastTimer=null;

  video.addEventListener('loadedmetadata',function(){
    updateVidUI(0, video.duration);
  });

  video.addEventListener('timeupdate',function(){
    if (video.currentTime > maxReached+1.5){
      video.currentTime=maxReached;
      showSkipToast(); return;
    }
    if (video.currentTime > maxReached) maxReached=video.currentTime;
    if (!S.student.progress[vid]) S.student.progress[vid]={done:false,quiz:null,elapsed:0};
    S.student.progress[vid].elapsed=Math.round(maxReached);
    updateVidUI(maxReached, video.duration);
  });

  video.addEventListener('seeking',function(){
    if (video.currentTime < maxReached-1){
      // 되감기는 허용 — maxReached 유지, 현재 위치만 변경
    } else if (video.currentTime > maxReached+1.5){
      video.currentTime=maxReached;
      showSkipToast();
    }
  });

  video.addEventListener('ended',function(){
    markComplete(vid);
  });

  function showSkipToast(){
    var t=document.getElementById('skip-toast');
    if (!t) return;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){ t.classList.remove('show'); },2000);
  }
  function updateVidUI(cur, dur){
    var pct=dur>0?Math.min(100,Math.round((cur/dur)*100)):0;
    var prog=document.getElementById('vid-prog');
    var time=document.getElementById('vid-time');
    if (prog) prog.style.width=pct+'%';
    if (time) time.textContent=fmtSec(cur)+' / '+fmtSec(dur);
  }
}

function selectVideo(vid) {
  clearTimer();
  S.selectedVid=vid;
  renderStudentBody();
  var v=S.videos.find(function(x){ return x.id===vid; });
  var p=S.student.progress[vid]||{done:false,quiz:null,elapsed:0};
  if (!p.done && v.type==='gdrive') startTimer(vid);
  window.scrollTo(0,0);
}

function markComplete(vid) {
  clearTimer();
  if (!S.student.progress[vid]) S.student.progress[vid]={done:false,quiz:null,elapsed:0};
  S.student.progress[vid].done=true;
  S.student.progress[vid].quiz=null;
  renderStudentBody();
}

/* ── 퀴즈 ── */
function buildQuizHTML(vid) {
  var qs=S.quizzes[vid]||[];
  if (!qs.length) return '<div style="font-size:13px;color:#888">이 강의에 퀴즈가 없습니다.</div>';
  if (S.quizSubmitted[vid]){
    var correct=qs.filter(function(q,i){ return S.quizAnswers[vid][i]===q.ans; }).length;
    return '<div class="quiz-result"><div class="quiz-score">'+correct+' / '+qs.length+'</div><div class="quiz-msg">'+(correct===qs.length?'완벽합니다!':correct>=qs.length/2?'잘 하셨습니다!':'다시 복습해보세요.')+'</div></div>';
  }
  if (!S.quizAnswers[vid]) S.quizAnswers[vid]=new Array(qs.length).fill(-1);
  var html=qs.map(function(q,qi){
    return '<div><div class="quiz-q">'+(qi+1)+'. '+q.q+'</div><div class="quiz-opts">'+q.opts.map(function(o,oi){
      return '<button class="quiz-opt'+(S.quizAnswers[vid][qi]===oi?' sel':'')+'" onclick="pickOpt(\''+vid+'\','+qi+','+oi+')">'+o+'</button>';
    }).join('')+'</div></div>';
  }).join('');
  return html+'<button class="btn-blue" style="margin-top:4px" onclick="submitQuiz(\''+vid+'\')">제출하기</button>';
}
function pickOpt(vid,qi,oi){
  if (!S.quizAnswers[vid]) S.quizAnswers[vid]=[];
  S.quizAnswers[vid][qi]=oi;
  var qb=document.querySelector('.quiz-card-body');
  if (qb) qb.innerHTML=buildQuizHTML(vid);
}
function submitQuiz(vid){
  var qs=S.quizzes[vid]||[];
  var ans=S.quizAnswers[vid]||[];
  if (ans.some(function(a){ return a===-1; })){ alert('모든 문제에 답해주세요.'); return; }
  S.quizSubmitted[vid]=true;
  var score=qs.filter(function(q,i){ return ans[i]===q.ans; }).length;
  S.student.progress[vid].quiz=score;
  renderStudentBody();
}

}

function onFileSelect(input){
  var file=input.files[0];
  if (!file) return;
  S.pendingFileName=file.name;
  S.pendingFileUrl=URL.createObjectURL(file);
  document.getElementById('fname').textContent=file.name;
}

function addVideo(){
  var title=document.getElementById('up-title').value.trim();
  var desc=document.getElementById('up-desc').value.trim();
  var order=parseInt(document.getElementById('up-order').value)||S.videos.length+1;
  if (!title){ alert('강의 제목을 입력해주세요.'); return; }

  var newVid;
  if (S.uploadType==='file'){
    if (!S.pendingFileUrl){ alert('영상 파일을 선택해주세요.'); return; }
    newVid={id:'v'+Date.now(),title:title,desc:desc,type:'file',src:S.pendingFileUrl,duration:0,order:order,active:true,date:new Date().toISOString().slice(0,10)};
    S.pendingFileUrl=null; S.pendingFileName='';
  } else {
    var url=document.getElementById('up-url').value.trim();
    var min=parseInt(document.getElementById('up-min').value)||0;
    var sec=parseInt(document.getElementById('up-sec').value)||0;
    var duration=(min*60)+sec||600;
    if (!url){ alert('구글 드라이브 링크를 입력해주세요.'); return; }
    var src=toEmbed(url);
    if (!src){ alert('올바른 구글 드라이브 링크가 아닙니다.\n\n예: https://drive.google.com/file/d/.../view?usp=sharing'); return; }
    newVid={id:'v'+Date.now(),title:title,desc:desc,type:'gdrive',src:src,duration:duration,order:order,active:true,date:new Date().toISOString().slice(0,10)};
  }
  S.videos.push(newVid);
  S.students.forEach(function(s){ if (!s.assigned.includes(newVid.id)) s.assigned.push(newVid.id); });
  alert('"'+title+'" 강의가 추가됐습니다!');
  renderAdminTab('videos');
}

function toggleActive(id){
  var v=S.videos.find(function(x){ return x.id===id; });
  if (v) v.active=!v.active;
  renderAdminTab('videos');
}
function delVideo(id){
  if (!confirm('정말 삭제하시겠습니까?')) return;
  S.videos=S.videos.filter(function(v){ return v.id!==id; });
  renderAdminTab('videos');
}

function buildAssignTab(){
  if (!S.students.length) return '<div style="font-size:13px;color:#aaa;text-align:center;padding:24px">등록된 수강자가 없습니다.</div>';
  return S.students.map(function(s){
    var av=S.videos.filter(function(v){ return v.active; });
    var chips=av.map(function(v){
      var on=s.assigned.includes(v.id);
      return '<button class="chip'+(on?' on':'')+'" onclick="toggleAssign(\''+s.id+'\',\''+v.id+'\')">'+(on?'✓ ':'')+v.title+'</button>';
    }).join('');
    return '<div class="card"><div style="display:flex;align-items:center;gap:10px"><div class="avatar">'+s.name[0]+'</div><div><div style="font-size:14px;font-weight:500;color:#1a1a1a">'+s.name+'</div><div style="font-size:12px;color:#888">'+s.phone+'</div></div><div style="margin-left:auto;font-size:12px;color:#aaa">'+s.assigned.length+'/'+av.length+'개</div></div><div class="assign-chips">'+chips+'</div></div>';
  }).join('');
}
function toggleAssign(uid,vid){
  var s=S.students.find(function(x){ return x.id===uid; });
  if (!s) return;
  if (s.assigned.includes(vid)) s.assigned=s.assigned.filter(function(x){ return x!==vid; });
  else s.assigned.push(vid);
  renderAdminTab('assign');
}

function buildStatsTab(){
  if (!S.students.length) return '<div style="font-size:13px;color:#aaa;text-align:center;padding:24px">등록된 수강자가 없습니다.</div>';
  var rows=S.students.map(function(s){
    var completed=Object.values(s.progress).filter(function(p){ return p.done; }).length;
    var vrows=S.videos.map(function(v){
      var p=s.progress[v.id]||{done:false,quiz:null};
      return '<div class="stat-vrow"><div class="stat-vtitle">'+v.title+'</div><div style="display:flex;gap:8px;flex-shrink:0">'
        +(p.done?'<span style="color:#16a34a;font-size:11px;font-weight:500">완료</span>':'<span style="color:#ddd;font-size:11px">-</span>')
        +(p.quiz!==null?'<span style="color:#1d4ed8;font-size:11px;font-weight:500">'+p.quiz+'점</span>':'<span style="color:#ddd;font-size:11px">-</span>')
        +'</div></div>';
    }).join('');
    return '<div class="card"><div style="display:flex;align-items:center;gap:10px"><div class="avatar">'+s.name[0]+'</div><div><div style="font-size:14px;font-weight:500;color:#1a1a1a">'+s.name+'</div><div style="font-size:12px;color:#888">'+s.phone+'</div></div><div style="margin-left:auto;font-size:12px;color:#16a34a;font-weight:500">'+completed+'/'+S.videos.length+' 완료</div></div>'+vrows+'</div>';
  }).join('');
  return '<button class="csv-btn" onclick="downloadCSV()">CSV 다운로드</button>'+rows;
}

function downloadCSV(){
  var rows=[['수강자명','전화번호','강의명','영상유형','수강완료','퀴즈점수']];
  S.students.forEach(function(s){
    S.videos.forEach(function(v){
      var p=s.progress[v.id]||{done:false,quiz:null};
      rows.push([s.name,s.phone,v.title,v.type==='file'?'직접업로드':'구글드라이브',p.done?'완료':'미완료',p.quiz!==null?p.quiz+'점':'-']);
    });
  });
  var csv='\uFEFF'+rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\r\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='수강현황_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
</script>
</body>
</html>
